<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cs-pack — Complete Package Guide</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
    --accent: #6c8ef5; --accent2: #4ade80; --accent3: #f59e0b; --accent4: #f87171;
    --text: #e2e8f0; --muted: #8892b0; --code-bg: #0d1117;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.7; }
  .hero { background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%); border-bottom: 1px solid var(--border); padding: 60px 40px; text-align: center; }
  .hero h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(90deg, #6c8ef5, #4ade80); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--muted); font-size: 1.2rem; margin-top: 12px; max-width: 640px; margin-left: auto; margin-right: auto; }
  .badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; font-size: 0.8rem; color: var(--accent); margin: 4px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
  .toc { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 40px; }
  .toc h2 { color: var(--accent); font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
  .toc ol { padding-left: 20px; } .toc li { margin: 6px 0; }
  .toc a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .toc a:hover { color: var(--accent); }
  .section { margin-bottom: 60px; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .section-num { background: var(--accent); color: #fff; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
  .section-num.green { background: var(--accent2); color: #000; }
  .section-num.amber { background: var(--accent3); color: #000; }
  .section-num.red { background: var(--accent4); color: #000; }
  h2 { font-size: 1.6rem; color: var(--text); }
  h3 { font-size: 1.1rem; color: var(--accent); margin: 20px 0 10px; }
  p { color: var(--muted); margin-bottom: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-weight: 700; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .card-title .icon { font-size: 1.2rem; }
  .card p { margin: 0; font-size: 0.9rem; }
  .flow { display: flex; flex-direction: column; }
  .flow-step { display: flex; gap: 16px; }
  .flow-line { display: flex; flex-direction: column; align-items: center; }
  .flow-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 4px; }
  .flow-dot.green { background: var(--accent2); }
  .flow-dot.amber { background: var(--accent3); }
  .flow-dot.red { background: var(--accent4); }
  .flow-connector { width: 2px; background: var(--border); flex: 1; min-height: 20px; }
  .flow-content { padding-bottom: 24px; flex: 1; }
  .flow-content h4 { color: var(--text); font-size: 0.95rem; margin-bottom: 4px; }
  .flow-content p { font-size: 0.85rem; margin: 0; }
  code { font-family: 'Cascadia Code','Fira Code',monospace; background: var(--code-bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; color: #79c0ff; }
  pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; overflow-x: auto; margin: 16px 0; }
  pre code { background: none; border: none; padding: 0; font-size: 0.85rem; color: #e2e8f0; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-right: 4px; }
  .tag.blue { background: rgba(108,142,245,0.15); color: var(--accent); }
  .tag.green { background: rgba(74,222,128,0.15); color: var(--accent2); }
  .tag.amber { background: rgba(245,158,11,0.15); color: var(--accent3); }
  .tag.red { background: rgba(248,113,113,0.15); color: var(--accent4); }
  table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  th { background: var(--surface2); color: var(--accent); text-align: left; padding: 10px 14px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--muted); }
  td code { font-size: 0.8rem; }
  .alert { border-radius: 8px; padding: 14px 18px; margin: 16px 0; font-size: 0.9rem; }
  .alert.info { background: rgba(108,142,245,0.1); border-left: 3px solid var(--accent); }
  .alert.success { background: rgba(74,222,128,0.1); border-left: 3px solid var(--accent2); }
  .alert.warning { background: rgba(245,158,11,0.1); border-left: 3px solid var(--accent3); }
  .alert.danger { background: rgba(248,113,113,0.1); border-left: 3px solid var(--accent4); }
  .hook-box { background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin: 16px 0; }
  .hook-box h4 { color: var(--accent2); font-family: monospace; margin-bottom: 12px; }
  .step-list { list-style: none; padding: 0; }
  .step-list li { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  .step-list li:last-child { border-bottom: none; }
  .step-num { background: var(--surface2); color: var(--accent); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
  @media (max-width: 768px) { .grid2, .grid3 { grid-template-columns: 1fr; } .hero h1 { font-size: 2rem; } }
</style>
</head>
<body>
